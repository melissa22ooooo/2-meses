<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>2 Meses 💗</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#ffcce6);
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:40px;
}

p{
font-size:18px;
}

img{
width:280px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

#contador{
font-size:22px;
margin-top:20px;
}

/* botón */

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:20px;
font-size:16px;
background:white;
color:#ff4da6;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* carta */

#carta{
display:none;
margin:30px;
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:20px;
}

/* corazones */

.corazon{
position:fixed;
top:-10px;
font-size:24px;
animation:caer 6s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-10px);}
100%{transform:translateY(110vh);}
}

iframe{
display:none;
}

</style>
</head>

<body>

<h1>💗 Llevamos 2 Meses 💗</h1>

<p>Gracias por estos dos meses de hablar conmigo</p>

<img src="nosotros.jpg">

<div id="contador"></div>

<button onclick="mostrarCarta()">Abrir mensaje 💌</button>

<div id="carta">
<p>
Gracias por estos dos meses.  
Tal vez parece poco tiempo, pero para mí significa mucho.  
Me gusta hablar contigo, compartir momentos y conocerte cada día más. 💗
</p>
</div>

<!-- música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY">
</iframe>

<script>

/* FECHA DE INICIO (cámbiala si quieres) */
const inicio = new Date("2026-01-05");

function actualizar(){

const ahora = new Date();
const diferencia = ahora - inicio;

const dias = Math.floor(diferencia/(1000*60*60*24));
const horas = Math.floor((diferencia/(1000*60*60))%24);
const minutos = Math.floor((diferencia/(1000*60))%60);

document.getElementById("contador").innerHTML =
"⏳ "+dias+" días "+horas+" horas "+minutos+" minutos hablando";
}

setInterval(actualizar,1000);


/* carta */

function mostrarCarta(){
document.getElementById("carta").style.display="block";
}


/* corazones */

function corazones(){

const corazon=document.createElement("div");
corazon.classList.add("corazon");
corazon.innerHTML="💖";

corazon.style.left=Math.random()*100+"vw";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},6000);

}

setInterval(corazones,400);

</script>

</body>
</html>
