<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Luis Alberto 🐥</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* GALAXIA */

.galaxy{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0a0a0a,#000);
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* ESTRELLA FUGAZ */

.shooting-star{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 5s linear infinite;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px)}
100%{transform:translate(120vw,120vh)}
}

/* INICIO */

#start{
position:absolute;
top:45%;
width:100%;
font-size:28px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

/* CORAZON DE POLLITOS */

.chick-heart{
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:36px;
opacity:0;
line-height:40px;
animation:heartAppear 4s forwards;
animation-delay:3s;
}

@keyframes heartAppear{
to{opacity:1}
}

/* TEXTO CINEMATOGRAFICO */

.message{
position:absolute;
bottom:20%;
width:100%;
font-size:22px;
opacity:0;
animation:textFade 4s forwards;
}

@keyframes textFade{
to{opacity:1}
}

/* FOTO */

.photo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
opacity:0;
animation:photoAppear 6s forwards;
animation-delay:15s;
}

.photo img{
width:260px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,255,255,0.8);
}

@keyframes photoAppear{

0%{
opacity:0;
transform:translate(-50%,-60%) scale(0.5);
}

100%{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

}

</style>
</head>

<body>

<div class="galaxy" id="galaxy"></div>

<div id="start">✨ Toca para comenzar ✨</div>

<div class="chick-heart">
🐥🐥🐥<br>
🐥🐥🐥🐥<br>
🐥🐥🐥🐥🐥<br>
🐥🐥🐥🐥<br>
🐥🐥🐥
</div>

<div class="photo">
<img src="nosotros.jpg">
</div>

<div class="message" id="msg"></div>

<iframe
id="music"
width="0"
height="0"
allow="autoplay"
frameborder="0">
</iframe>

<script>

/* CREAR ESTRELLAS */

const galaxy=document.getElementById("galaxy")

for(let i=0;i<300;i++){

let star=document.createElement("div")
star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

galaxy.appendChild(star)

}

/* ESTRELLAS FUGACES */

setInterval(()=>{

let star=document.createElement("div")
star.className="shooting-star"

star.style.top=Math.random()*50+"%"
star.style.left=Math.random()*50+"%"

document.body.appendChild(star)

setTimeout(()=>{star.remove()},5000)

},4000)

/* MENSAJES */

const mensajes=[

"A alguien muy especial…",

"Luis Alberto",

"Mi pio pio 🐥",

"Un hombre trabajador",

"A quien le gustan las motos 🏍️",

"Con una sonrisa que me encanta",

"Y ese sarcasmo que lo hace único",

"Todo de ti me gusta",

"Eres alguien importante en mi vida",

"No eres una opción…",

"Eres una prioridad",

"Dos meses hablando contigo ✨"

]

let i=0

function mostrarMensaje(){

if(i<mensajes.length){

const msg=document.getElementById("msg")

msg.style.opacity=0

setTimeout(()=>{
msg.innerText=mensajes[i]
msg.style.opacity=1
},500)

i++

}

}

setInterval(mostrarMensaje,3000)

/* INICIAR MUSICA */

document.getElementById("start").onclick=function(){

this.style.display="none"

document.getElementById("music").src=
"https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY"

mostrarMensaje()

}

</script>

</body>
</html>
