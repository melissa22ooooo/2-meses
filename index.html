<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Luis Alberto 🐥</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* GALAXIA */

.galaxy{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0a0a0a,#000);
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* ESTRELLA FUGAZ */

.shooting-star{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 4s linear;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px)}
100%{transform:translate(120vw,120vh)}
}

/* BOTON INICIO */

#start{
position:absolute;
top:45%;
width:100%;
font-size:28px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}
}

/* MENSAJES */

.message{
position:absolute;
bottom:25%;
width:100%;
font-size:22px;
opacity:0;
transition:opacity 2s;
}

/* CORAZON DE POLLITOS */

.heart{
position:absolute;
top:25%;
left:50%;
transform:translateX(-50%);
font-size:34px;
line-height:38px;
opacity:0;
transition:opacity 3s;
}

/* FOTO FINAL */

.photo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.5);
opacity:0;
transition:all 4s;
}

.photo img{
width:260px;
border-radius:20px;
box-shadow:0 0 40px white;
}

</style>
</head>

<body>

<div class="galaxy" id="galaxy"></div>

<div id="start">✨ Toca para comenzar ✨</div>

<div class="heart" id="heart">
🐥🐥🐥<br>
🐥🐥🐥🐥<br>
🐥🐥🐥🐥🐥<br>
🐥🐥🐥🐥<br>
🐥🐥🐥
</div>

<div class="photo" id="photo">
<img src="nosotros.jpg">
</div>

<div class="message" id="msg"></div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* CREAR ESTRELLAS */

const galaxy=document.getElementById("galaxy")

for(let i=0;i<250;i++){

let star=document.createElement("div")
star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

galaxy.appendChild(star)

}

/* ESTRELLAS FUGACES */

setInterval(()=>{

let star=document.createElement("div")
star.className="shooting-star"

star.style.top=Math.random()*40+"%"
star.style.left=Math.random()*40+"%"

document.body.appendChild(star)

setTimeout(()=>star.remove(),4000)

},6000)

/* MENSAJES */

const mensajes=[

"A alguien muy especial…",

"Luis Alberto",

"Mi pio pio 🐥",

"Un hombre trabajador",

"A quien le gustan las motos 🏍️",

"Con una sonrisa que me encanta",

"Y ese sarcasmo que lo hace único",

"Todo de ti me gusta",

"Eres alguien importante en mi vida",

"No eres una opción…",

"Eres una prioridad"

]

let index=0
const msg=document.getElementById("msg")

function siguienteMensaje(){

if(index<mensajes.length){

msg.style.opacity=0

setTimeout(()=>{
msg.innerText=mensajes[index]
msg.style.opacity=1
},1000)

index++

}

}

/* SECUENCIA CINEMATOGRAFICA */

function iniciarHistoria(){

let tiempo=4000

mensajes.forEach((m,i)=>{

setTimeout(siguienteMensaje, tiempo)

tiempo+=5000

})

/* CORAZON */

setTimeout(()=>{
document.getElementById("heart").style.opacity=1
},tiempo+2000)

/* FOTO FINAL */

setTimeout(()=>{

let photo=document.getElementById("photo")

photo.style.opacity=1
photo.style.transform="translate(-50%,-50%) scale(1)"

msg.innerText="Dos meses hablando contigo ✨"
msg.style.opacity=1

},tiempo+8000)

}

/* INICIO */

document.getElementById("start").onclick=function(){

this.style.display="none"

document.getElementById("music").src=
"https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY"

iniciarHistoria()

}

</script>

</body>
</html>
