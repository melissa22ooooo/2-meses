<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 Meses 💗</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* fondo estrellas */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ff4da6,black);
animation:fondo 12s infinite alternate;
z-index:-2;
}

@keyframes fondo{
0%{transform:scale(1)}
100%{transform:scale(1.4)}
}

/* escenas */

.escena{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
opacity:0;
transition:2s;
padding:30px;
box-sizing:border-box;
}

.activa{
opacity:1;
}

/* texto */

h1{
font-size:36px;
animation:latido 2s infinite;
}

p{
font-size:20px;
max-width:320px;
}

/* latido */

@keyframes latido{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* foto */

img{
width:85%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 40px rgba(255,120,200,0.9);
}

/* contador */

#contador{
font-size:24px;
margin-top:20px;
}

/* corazones */

.corazon{
position:absolute;
font-size:22px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

iframe{
display:none;
}

</style>

</head>

<body>

<!-- escena 1 -->

<div class="escena activa">
<h1>💗 Hola 💗</h1>
<p>Quería hacer algo especial para ti...</p>
</div>

<!-- escena 2 -->

<div class="escena">
<h1>💗 Llevamos 2 Meses 💗</h1>
</div>

<!-- escena 3 -->

<div class="escena">
<p>Gracias por estos dos meses de hablar conmigo</p>
</div>

<!-- escena 4 -->

<div class="escena">
<img src="nosotros.jpg">
</div>

<!-- escena 5 -->

<div class="escena">
<p>Y llevamos...</p>
<div id="contador"></div>
</div>

<!-- escena final -->

<div class="escena">
<h1>💗 Gracias por todo 💗</h1>
<p>Espero que sean muchos meses más contigo</p>
</div>

<!-- música -->

<iframe width="0" height="0"
src="https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY">
</iframe>

<script>

/* escenas tipo video */

const escenas=document.querySelectorAll(".escena")
let actual=0

function siguiente(){

escenas[actual].classList.remove("activa")

actual++

if(actual>=escenas.length) return

escenas[actual].classList.add("activa")

}

setInterval(siguiente,4500)

/* contador */

const horas=Math.floor((diferencia/(1000*60*60))%24)

/* corazones */

function corazones(){

const corazon=document.createElement("div")

corazon.classList.add("corazon")

corazon.innerHTML="💖"

corazon.style.left=Math.random()*100+"vw"

document.body.appendChild(corazon)

setTimeout(()=>{
corazon.remove()
},6000)

}

</script>

</body>

</html>
