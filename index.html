<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2 Meses 💗</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
text-align:center;
}

.pantalla{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:1s;
padding:20px;
box-sizing:border-box;
}

.activa{
opacity:1;
}

h1{
font-size:32px;
}

p{
font-size:20px;
max-width:300px;
}

img{
width:80%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

#contador{
font-size:22px;
margin-top:20px;
}

/* fondo animado */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ff4da6,black);
animation:fondo 10s infinite alternate;
z-index:-1;
}

@keyframes fondo{
0%{transform:scale(1);}
100%{transform:scale(1.3);}
}

iframe{
display:none;
}

</style>
</head>

<body onclick="siguiente()">

<!-- pantalla 1 -->

<div class="pantalla activa">
<h1>💗 Hola 💗</h1>
<p>Toca la pantalla</p>
</div>

<!-- pantalla 2 -->

<div class="pantalla">

<h1>2 meses hablando</h1>
</div>

<!-- pantalla 3 -->

<div class="pantalla">
<p>Tal vez no es mucho tiempo...</p>
</div>

<!-- pantalla 4 -->

<div class="pantalla">
<p>Pero cada momento contigo ha sido especial 💖</p>
</div>

<!-- pantalla 5 -->

<div class="pantalla">
<img src="nosotros.jpg">
</div>

<!-- pantalla 6 -->

<div class="pantalla">
<p>Y llevamos...</p>
<div id="contador"></div>
</div>

<!-- pantalla final -->

<div class="pantalla">
<h1>💗 Gracias por estos 2 meses 💗</h1>
<p>Espero que sean muchos más</p>
</div>

<!-- música -->

<iframe width="0" height="0"
src="https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY">
</iframe>

}

</body>
</html>
