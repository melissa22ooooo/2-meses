<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Luis Alberto 🐥</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

/* GALAXIA */

.galaxy{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0a0a0a,#000);
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

/* TEXTO CENTRAL */

.text{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-40%);

font-size:24px;

text-align:center;

padding:20px;

opacity:0;

filter:blur(10px);

transition:all 2.5s ease;

}

/* APARICIÓN BONITA */

.text.show{

opacity:1;

filter:blur(0px);

transform:translate(-50%,-50%);

}

/* FOTO */

.photo{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%) scale(0.5);

opacity:0;

transition:all 4s ease;

}

.photo img{

width:270px;

border-radius:20px;

box-shadow:0 0 40px white;

}

.photo.show{

opacity:1;

transform:translate(-50%,-50%) scale(1);

}

/* BOTÓN INICIO */

#start{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

font-size:28px;

cursor:pointer;

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{opacity:0.4}
50%{opacity:1}
100%{opacity:0.4}

}

</style>
</head>

<body>

<div class="galaxy" id="galaxy"></div>

<div id="start">✨ Toca para comenzar ✨</div>

<div class="text" id="text"></div>

<div class="photo" id="photo">
<img src="nosotros.jpg">
</div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* CREAR ESTRELLAS */

const galaxy=document.getElementById("galaxy")

for(let i=0;i<220;i++){

let star=document.createElement("div")

star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

galaxy.appendChild(star)

}

/* FRASES */

const frases=[

"A alguien muy especial…",

"Luis Alberto",

"Mi pio pio 🐥",

"Un hombre trabajador",

"A quien le gustan las motos 🏍️",

"Con una sonrisa que me encanta",

"Y ese sarcasmo que lo hace único",

"Todo de ti me gusta",

"Eres alguien importante en mi vida",

"No eres una opción…",

"Eres una prioridad"

]

const text=document.getElementById("text")

let index=0

function mostrarFrase(){

if(index<frases.length){

text.classList.remove("show")

setTimeout(()=>{

text.innerText=frases[index]

text.classList.add("show")

},700)

index++

}

}

/* HISTORIA */

function iniciarHistoria(){

let tiempo=2000

frases.forEach(()=>{

setTimeout(mostrarFrase,tiempo)

tiempo+=4500

})

/* FOTO FINAL */

setTimeout(()=>{

text.classList.remove("show")

let photo=document.getElementById("photo")

photo.classList.add("show")

setTimeout(()=>{

text.innerText="6 de enero → 6 de marzo 💫\nDos meses hablando contigo"

text.classList.add("show")

},2000)

},tiempo+2000)

}

/* INICIO */

document.getElementById("start").onclick=function(){

this.style.display="none"

document.getElementById("music").src="https://www.youtube.com/embed/aJGWTdueHFY?autoplay=1&loop=1&playlist=aJGWTdueHFY"

iniciarHistoria()

}

</script>

</body>
</html>
